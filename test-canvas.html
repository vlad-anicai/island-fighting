<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Test</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            margin: 0;
        }
        canvas {
            border: 2px solid white;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="testCanvas" width="400" height="300"></canvas>
    <script>
        const canvas = document.getElementById('testCanvas');
        const ctx = canvas.getContext('2d');
        
        if (ctx) {
            // Disable image smoothing for pixelated style
            ctx.imageSmoothingEnabled = false;
            
            // Draw test pattern
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(50, 50, 80, 80);
            
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(150, 50, 80, 80);
            
            ctx.fillStyle = '#3498db';
            ctx.fillRect(250, 50, 80, 80);
            
            ctx.fillStyle = '#fff';
            ctx.font = '20px "Courier New"';
            ctx.fillText('Canvas Rendering: OK', 80, 200);
            
            console.log('Canvas test successful');
            console.log('Context type:', ctx.constructor.name);
            console.log('Image smoothing disabled:', !ctx.imageSmoothingEnabled);
        } else {
            console.error('Failed to get Canvas context');
            document.body.innerHTML = '<h1 style="color: red;">Canvas not supported</h1>';
        }
    </script>
</body>
</html>
