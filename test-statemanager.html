<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StateManager Demo - Island Fighting Game</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #4ec9b0; }
        h2 { color: #569cd6; margin-top: 30px; }
        .section {
            background: #252526;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #007acc;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        button:hover { background: #1177bb; }
        button:active { background: #005a9e; }
        input {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #007acc;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .status {
            background: #1e1e1e;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #007acc;
        }
        .status-item {
            margin: 5px 0;
        }
        .label { color: #569cd6; }
        .value { color: #4ec9b0; font-weight: bold; }
        .bindings {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .binding-slot {
            background: #1e1e1e;
            padding: 15px;
            border: 2px solid #007acc;
            text-align: center;
        }
        .key { 
            font-size: 24px; 
            color: #4ec9b0; 
            font-weight: bold;
        }
        .ability { 
            margin-top: 10px;
            color: #d4d4d4;
            font-size: 12px;
        }
        .log {
            background: #1e1e1e;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #007acc;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry {
            margin: 3px 0;
            color: #858585;
        }
        .log-entry.success { color: #4ec9b0; }
        .log-entry.error { color: #f48771; }
    </style>
</head>
<body>
    <h1>🎮 StateManager Demo</h1>
    <p>Interactive demonstration of the StateManager class with LocalStorage persistence.</p>
    
    <div class="section">
        <h2>💰 Coin Balance</h2>
        <div class="status">
            <div class="status-item">
                <span class="label">Current Balance:</span>
                <span class="value" id="coinBalance">0</span>
                <span class="label">coins</span>
            </div>
        </div>
        <div class="controls">
            <input type="number" id="coinAmount" value="100" min="0" placeholder="Amount">
            <button onclick="addCoins()">Add Coins</button>
            <button onclick="spendCoins()">Spend Coins</button>
        </div>
    </div>
    
    <div class="section">
        <h2>⚡ Owned Abilities</h2>
        <div class="status">
            <div class="status-item">
                <span class="label">Owned:</span>
                <span class="value" id="ownedAbilities">None</span>
            </div>
        </div>
        <div class="controls">
            <button onclick="purchaseAbility('STRONG_PUNCH', 100)">Buy Strong Punch (100)</button>
            <button onclick="purchaseAbility('FIRE_BALL', 400)">Buy Fire Ball (400)</button>
            <button onclick="purchaseAbility('SHIELD', 750)">Buy Shield (750)</button>
            <button onclick="purchaseAbility('TORNADO', 1000)">Buy Tornado (1000)</button>
        </div>
    </div>
    
    <div class="section">
        <h2>🎹 Key Bindings</h2>
        <div class="bindings">
            <div class="binding-slot">
                <div class="key">Z</div>
                <div class="ability" id="binding-z">Not Assigned</div>
            </div>
            <div class="binding-slot">
                <div class="key">X</div>
                <div class="ability" id="binding-x">Not Assigned</div>
            </div>
            <div class="binding-slot">
                <div class="key">C</div>
                <div class="ability" id="binding-c">Not Assigned</div>
            </div>
            <div class="binding-slot">
                <div class="key">V</div>
                <div class="ability" id="binding-v">Not Assigned</div>
            </div>
        </div>
        <div class="controls">
            <select id="keySelect">
                <option value="z">Z</option>
                <option value="x">X</option>
                <option value="c">C</option>
                <option value="v">V</option>
            </select>
            <select id="abilitySelect">
                <option value="">Clear Binding</option>
            </select>
            <button onclick="assignBinding()">Assign Ability</button>
        </div>
    </div>
    
    <div class="section">
        <h2>🔧 Actions</h2>
        <div class="controls">
            <button onclick="refreshDisplay()">Refresh Display</button>
            <button onclick="clearAllData()">Clear All Data</button>
            <button onclick="location.reload()">Reload Page</button>
        </div>
    </div>
    
    <div class="section">
        <h2>📋 Activity Log</h2>
        <div class="log" id="activityLog"></div>
    </div>
    
    <script type="module">
        import { StateManager } from './js/state/StateManager.js';
        
        // Initialize StateManager
        window.stateManager = new StateManager();
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('activityLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }
        
        function updateDisplay() {
            // Update coin balance
            document.getElementById('coinBalance').textContent = window.stateManager.getCoins();
            
            // Update owned abilities
            const owned = window.stateManager.getOwnedAbilities();
            document.getElementById('ownedAbilities').textContent = 
                owned.length > 0 ? owned.join(', ') : 'None';
            
            // Update ability select dropdown
            const abilitySelect = document.getElementById('abilitySelect');
            abilitySelect.innerHTML = '<option value="">Clear Binding</option>';
            owned.forEach(ability => {
                const option = document.createElement('option');
                option.value = ability;
                option.textContent = ability.replace(/_/g, ' ');
                abilitySelect.appendChild(option);
            });
            
            // Update key bindings display
            const bindings = window.stateManager.getKeyBindings();
            ['z', 'x', 'c', 'v'].forEach(key => {
                const binding = bindings[key];
                const element = document.getElementById(`binding-${key}`);
                element.textContent = binding ? binding.replace(/_/g, ' ') : 'Not Assigned';
            });
        }
        
        window.addCoins = function() {
            const amount = parseInt(document.getElementById('coinAmount').value) || 0;
            if (amount > 0) {
                window.stateManager.addCoins(amount);
                log(`Added ${amount} coins`, 'success');
                updateDisplay();
            } else {
                log('Invalid amount', 'error');
            }
        };
        
        window.spendCoins = function() {
            const amount = parseInt(document.getElementById('coinAmount').value) || 0;
            if (amount > 0) {
                const success = window.stateManager.spendCoins(amount);
                if (success) {
                    log(`Spent ${amount} coins`, 'success');
                } else {
                    log(`Insufficient coins (need ${amount}, have ${window.stateManager.getCoins()})`, 'error');
                }
                updateDisplay();
            } else {
                log('Invalid amount', 'error');
            }
        };
        
        window.purchaseAbility = function(abilityType, cost) {
            const success = window.stateManager.purchaseAbility(abilityType, cost);
            if (success) {
                log(`Purchased ${abilityType} for ${cost} coins`, 'success');
            } else {
                if (window.stateManager.hasAbility(abilityType)) {
                    log(`Already own ${abilityType}`, 'error');
                } else {
                    log(`Cannot purchase ${abilityType} (need ${cost} coins, have ${window.stateManager.getCoins()})`, 'error');
                }
            }
            updateDisplay();
        };
        
        window.assignBinding = function() {
            const key = document.getElementById('keySelect').value;
            const ability = document.getElementById('abilitySelect').value || null;
            
            window.stateManager.assignAbility(key, ability);
            
            if (ability) {
                log(`Assigned ${ability} to key ${key.toUpperCase()}`, 'success');
            } else {
                log(`Cleared binding for key ${key.toUpperCase()}`, 'success');
            }
            updateDisplay();
        };
        
        window.refreshDisplay = function() {
            // Reload state from storage
            window.stateManager = new StateManager();
            updateDisplay();
            log('Display refreshed from LocalStorage', 'success');
        };
        
        window.clearAllData = function() {
            if (confirm('Are you sure you want to clear all saved data?')) {
                localStorage.clear();
                window.stateManager = new StateManager();
                updateDisplay();
                log('All data cleared', 'success');
            }
        };
        
        // Initial display update
        updateDisplay();
        log('StateManager initialized', 'success');
    </script>
</body>
</html>
